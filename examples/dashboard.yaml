type: sections
path: noc
title: Network Operations Center
icon: mdi:network
max_columns: 3
subview: true
sections:
  - type: grid
    column_span: 3
    cards:
      - type: markdown
        content: >
          ## 🌐 Network Status Dashboard

          **Real-time monitoring and control center for dual-WAN infrastructure**

          Current Status: **{{ states('sensor.internet_health_state') }}** • Routing: **{{ states('sensor.internet_routing_mode_stable') }}** • Uptime: **{{ states('sensor.internet_uptime_today_percent') }}%**
        grid_options:
          columns: full
        uix:
          style: |
            ha-card {
              background: linear-gradient(135deg, rgba(33, 150, 243, 0.1) 0%, rgba(76, 175, 80, 0.1) 100%);
              border-left: 4px solid var(--primary-color);
            }

  - type: grid
    column_span: 3
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Network Health Score
            secondary: >-
              {{ states('sensor.internet_stability_score') }}% •
              {{ states('sensor.internet_stability_state') }}
            icon: mdi:shield-check
            tap_action:
              action: more-info
              entity: sensor.internet_stability_score
            grid_options:
              columns: full
            color: >
              {% set total = states('sensor.internet_stability_score') | int(0) %}
              {{ 'green' if total > 90 else 'amber' if total > 75 else 'orange' if total > 50 else 'red' }}
            features_position: bottom

          - type: custom:mushroom-template-card
            primary: >-
              {{ state_attr('sensor.wan1_configuration', 'name') | default('WAN1') }}
            secondary: >
              {%- set avail = state_attr('binary_sensor.wan1_online_api', 'availability') | float(0) -%}
              {%- set lat = state_attr('binary_sensor.wan1_online_api', 'latency_avg') | float(0) -%}
              {%- set mbps = states('sensor.udm_wan1_total_mbps_smoothed') | float(0) -%}
              {{ avail | round(1) }}% • {{ lat | round(0) }}ms • {{ mbps | round(1) }} Mbps
            icon: mdi:wan
            icon_color: >-
              {{ 'green' if is_state('binary_sensor.wan1_online_api', 'on') else 'red' }}
            badge_icon: >-
              {{ 'mdi:check-circle' if is_state('binary_sensor.wan1_online_api', 'on') else 'mdi:close-circle' }}
            badge_color: >-
              {{ 'green' if is_state('binary_sensor.wan1_online_api', 'on') else 'red' }}
            tap_action:
              action: more-info
              entity: binary_sensor.wan1_online_api

          - type: custom:mushroom-template-card
            primary: >-
              {{ state_attr('sensor.wan2_configuration', 'name') | default('WAN2') }}
            secondary: >
              {%- set avail = state_attr('binary_sensor.wan2_online_api', 'availability') | float(0) -%}
              {%- set lat = state_attr('binary_sensor.wan2_online_api', 'latency_avg') | float(0) -%}
              {%- set mbps = states('sensor.udm_wan2_total_mbps_smoothed') | float(0) -%}
              {{ avail | round(1) }}% • {{ lat | round(0) }}ms • {{ mbps | round(1) }} Mbps
            icon: mdi:satellite-variant
            icon_color: >-
              {{ 'green' if is_state('binary_sensor.wan2_online_api', 'on') else 'red' }}
            badge_icon: >-
              {{ 'mdi:check-circle' if is_state('binary_sensor.wan2_online_api', 'on') else 'mdi:close-circle' }}
            badge_color: >-
              {{ 'green' if is_state('binary_sensor.wan2_online_api', 'on') else 'red' }}
            tap_action:
              action: more-info
              entity: binary_sensor.wan2_online_api

        grid_options:
          columns: full
          rows: auto

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            icon: mdi:clock-outline
            content: "{{ states('sensor.internet_uptime_today_percent') }}%"
            entity: sensor.internet_uptime_today_percent
            icon_color: green
            tap_action:
              action: more-info
          - type: template
            icon: mdi:swap-horizontal
            content: "{{ states('counter.internet_failovers_today') }} Failovers"
            entity: counter.internet_failovers_today
            icon_color: >-
              {{ 'green' if states('counter.internet_failovers_today') | int(0) == 0 else 'orange' }}
            tap_action:
              action: more-info
          - type: template
            icon: mdi:speedometer
            content: >-
              {{ states('sensor.speedtest_download') | float(0) | round(1) }} Mbps
            entity: sensor.speedtest_download
            icon_color: blue
            tap_action:
              action: more-info
          - type: template
            icon: mdi:speedometer
            content: "{{ states('sensor.speedtest_upload') | float(0) | round(1) }} Mbps"
            entity: sensor.speedtest_upload
            icon_color: green
            tap_action:
              action: more-info
          - type: template
            icon: mdi:speedometer
            content: "{{ states('sensor.speedtest_ping') | float(0) | round(1) }} ms"
            entity: sensor.speedtest_ping
            icon_color: green
            tap_action:
              action: more-info
          - type: template
            icon: mdi:wan
            content: "{{ states('counter.wan_total_outages_today') }} WAN1"
            entity: counter.wan_total_outages_today
            icon_color: >-
              {{ 'green' if states('counter.wan_total_outages_today') | int(0) == 0 else 'red' }}
            tap_action:
              action: more-info
          - type: template
            icon: mdi:wan
            content: "{{ states('counter.wan1_outages_today') }} WAN1"
            entity: counter.wan1_outages_today
            icon_color: >-
              {{ 'green' if states('counter.wan1_outages_today') | int(0) == 0 else 'red' }}
            tap_action:
              action: more-info
          - type: template
            icon: mdi:satellite-variant
            content: "{{ states('counter.wan2_outages_today') }} WAN2"
            entity: counter.wan2_outages_today
            icon_color: >-
              {{ 'green' if states('counter.wan2_outages_today') | int(0) == 0 else 'red' }}
            tap_action:
              action: more-info
        alignment: center
        grid_options:
          columns: full
          rows: auto

      - type: custom:modern-circular-gauge
        entity: sensor.internet_stability_score
        name: Internet Stability
        min: 0
        max: 100
        unit: "%"
        needle: false
        adaptive_state_color: true
        adaptive_label_color: true
        adaptive_graph_range: false
        segments:
          - from: 0
            color:
              - 200
              - 0
              - 0
          - from: 50
            color:
              - 255
              - 140
              - 0
          - from: 75
            color:
              - 255
              - 210
              - 0
          - from: 90
            color:
              - 0
              - 200
              - 0

      - type: custom:modern-circular-gauge
        entity: sensor.wan1_stability_score
        name: WAN1 Stability
        min: 0
        max: 100
        unit: "%"
        needle: false
        adaptive_state_color: true
        adaptive_label_color: true
        adaptive_graph_range: false
        segments:
          - from: 0
            color:
              - 200
              - 0
              - 0
          - from: 50
            color:
              - 255
              - 140
              - 0
          - from: 75
            color:
              - 255
              - 210
              - 0
          - from: 90
            color:
              - 0
              - 200
              - 0

      - type: custom:modern-circular-gauge
        entity: sensor.wan2_stability_score
        name: WAN2 Stability
        min: 0
        max: 100
        unit: "%"
        needle: false
        adaptive_state_color: true
        adaptive_label_color: true
        adaptive_graph_range: false
        segments:
          - from: 0
            color:
              - 200
              - 0
              - 0
          - from: 50
            color:
              - 255
              - 140
              - 0
          - from: 75
            color:
              - 255
              - 210
              - 0
          - from: 90
            color:
              - 0
              - 200
              - 0
             
      - type: entities
        title: WAN Events
        entities:
          - entity: sensor.wan_last_event
            name: Last Event
          - type: attribute
            entity: sensor.wan_last_event
            attribute: wan
            name: WAN
          - type: attribute
            entity: sensor.wan_last_event
            attribute: message
            name: Message
          - entity: sensor.wan_last_event_ago_pretty
            name: Occurred

      - type: markdown
        title: WAN Timeline
        content: |
          {% set items = state_attr('sensor.wan_event_history', 'events') or [] %}
          {% if items | count == 0 %}
          Keine WAN Events vorhanden
          {% else %}
          {% for e in items[:10] %}
          • {{ as_datetime(e.ts).strftime('%d.%m. %H:%M') }} • {{ e.wan_name }} • {{ e.event }}
          {% endfor %}
          {% endif %}

  - type: grid
    column_span: 3
    cards:
      - type: heading
        heading: Remote Access and VPN
        heading_style: title

  - type: grid
    column_span: 3
    cards:
      - type: markdown
        content: >
          ## 🔐 Remote Access Operations

          **Unified visibility for L2TP remote users and Teleport sessions**

          Current Status: **{{ 'ACTIVE' if is_state('binary_sensor.udm_vpn_active', 'on') else 'IDLE' }}** •
          Active Sessions: **{{ states('sensor.udm_vpn_active_count') }}** •
          L2TP: **{{ states('sensor.udm_vpn_remote_user_count') }}** •
          Teleport: **{{ states('sensor.udm_vpn_teleport_count') }}**
        grid_options:
          columns: full
        uix:
          style: |
            ha-card {
              background: linear-gradient(135deg, rgba(40,140,165,0.10) 0%, rgba(99,202,214,0.08) 100%);
              border-left: 4px solid var(--primary-color);
            }

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Remote Access Status
            secondary: >
              {%- set active = states('sensor.udm_vpn_active_count') | int(0) -%}
              {%- set src = states('sensor.udm_vpn_source') -%}
              {%- if active > 0 -%}
                {{ active }} active • {{ src }}
              {%- else -%}
                No active sessions • {{ src }}
              {%- endif -%}
            icon: mdi:vpn
            icon_color: >
              {% if is_state('binary_sensor.udm_vpn_active', 'on') %}
                cyan
              {% elif is_state('binary_sensor.udm_vpn_endpoint_available', 'on') %}
                green
              {% else %}
                red
              {% endif %}
            badge_icon: >
              {% if is_state('binary_sensor.udm_vpn_active', 'on') %}
                mdi:check-circle
              {% elif is_state('binary_sensor.udm_vpn_endpoint_available', 'on') %}
                mdi:clock-outline
              {% else %}
                mdi:close-circle
              {% endif %}
            badge_color: >
              {% if is_state('binary_sensor.udm_vpn_active', 'on') %}
                cyan
              {% elif is_state('binary_sensor.udm_vpn_endpoint_available', 'on') %}
                green
              {% else %}
                red
              {% endif %}
            tap_action:
              action: more-info
              entity: sensor.udm_vpn_active_count

          - type: custom:mushroom-template-card
            primary: L2TP Remote Users
            secondary: >
              {%- set n = states('sensor.udm_vpn_remote_user_count') | int(0) -%}
              {%- if n > 0 -%}
                {{ n }} connected
              {%- else -%}
                No L2TP users
              {%- endif -%}
            icon: mdi:account-network
            icon_color: >
              {{ 'green' if states('sensor.udm_vpn_remote_user_count') | int(0) == 0 else 'cyan' }}
            badge_icon: >
              {{ 'mdi:check-circle' if states('sensor.udm_vpn_remote_user_count') | int(0) > 0 else 'mdi:minus-circle-outline' }}
            badge_color: >
              {{ 'cyan' if states('sensor.udm_vpn_remote_user_count') | int(0) > 0 else 'grey' }}
            tap_action:
              action: more-info
              entity: sensor.udm_vpn_remote_user_count

          - type: custom:mushroom-template-card
            primary: Teleport Sessions
            secondary: >
              {%- set n = states('sensor.udm_vpn_teleport_count') | int(0) -%}
              {%- if n > 0 -%}
                {{ n }} connected
              {%- else -%}
                No Teleport users
              {%- endif -%}
            icon: mdi:airplane
            icon_color: >
              {{ 'green' if states('sensor.udm_vpn_teleport_count') | int(0) == 0 else 'cyan' }}
            badge_icon: >
              {{ 'mdi:check-circle' if states('sensor.udm_vpn_teleport_count') | int(0) > 0 else 'mdi:minus-circle-outline' }}
            badge_color: >
              {{ 'cyan' if states('sensor.udm_vpn_teleport_count') | int(0) > 0 else 'grey' }}
            tap_action:
              action: more-info
              entity: sensor.udm_vpn_teleport_count

        grid_options:
          columns: full
          rows: auto

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            icon: mdi:account-group
            content: "{{ states('sensor.udm_vpn_active_count') }} Active"
            entity: sensor.udm_vpn_active_count
            icon_color: >
              {{ 'cyan' if states('sensor.udm_vpn_active_count') | int(0) > 0 else 'green' }}
            tap_action:
              action: more-info

          - type: template
            icon: mdi:account-network
            content: "{{ states('sensor.udm_vpn_remote_user_count') }} L2TP"
            entity: sensor.udm_vpn_remote_user_count
            icon_color: >
              {{ 'cyan' if states('sensor.udm_vpn_remote_user_count') | int(0) > 0 else 'grey' }}
            tap_action:
              action: more-info

          - type: template
            icon: mdi:airplane
            content: "{{ states('sensor.udm_vpn_teleport_count') }} Teleport"
            entity: sensor.udm_vpn_teleport_count
            icon_color: >
              {{ 'cyan' if states('sensor.udm_vpn_teleport_count') | int(0) > 0 else 'grey' }}
            tap_action:
              action: more-info

          - type: template
            icon: mdi:server-network
            content: >
              {% if is_state('binary_sensor.udm_vpn_clients_endpoint_available', 'on') %}
                Clients API OK
              {% else %}
                Clients API Down
              {% endif %}
            entity: binary_sensor.udm_vpn_clients_endpoint_available
            icon_color: >
              {{ 'green' if is_state('binary_sensor.udm_vpn_clients_endpoint_available', 'on') else 'red' }}
            tap_action:
              action: more-info

        alignment: center
        grid_options:
          columns: full
          rows: auto

      - type: conditional
        conditions:
          - entity: binary_sensor.udm_vpn_active
            state: "on"
        card:
          type: entities
          title: Connected Sessions
          show_header_toggle: false
          entities:
            - entity: sensor.udm_vpn_connected_users
              name: Active Users
            - entity: sensor.udm_vpn_source
              name: Source
            - entity: sensor.udm_vpn_endpoint_http
              name: VPN Endpoint HTTP

      - type: conditional
        conditions:
          - entity: binary_sensor.udm_vpn_active
            state: "off"
        card:
          type: markdown
          content: >
            **Remote Access Status**

            No L2TP or Teleport sessions are currently connected

  - type: grid
    column_span: 3
    cards:
      - type: heading
        heading: Routing
        heading_style: title

  - type: grid
    column_span: 3
    cards:
      - type: markdown
        content: >-
          ## 🔀 Routing Decision Matrix


          **Current Mode:** `{{ states('sensor.internet_routing_mode_stable') }}`


          {% set mode = states('sensor.internet_routing_mode_stable') %}

          {% set wan1_online = is_state('binary_sensor.wan1_online_api', 'on') %}

          {% set wan2_online = is_state('binary_sensor.wan2_online_api', 'on') %}

          {% set wan1_name = state_attr('sensor.wan1_configuration', 'name') | default('Telekom DSL') %}

          {% set wan2_name = state_attr('sensor.wan2_configuration', 'name') | default('Starlink') %}

          {% set wan1_prio = state_attr('sensor.wan1_configuration', 'failover_priority') | int(99) %}

          {% set wan2_prio = state_attr('sensor.wan2_configuration', 'failover_priority') | int(99) %}

          {% set wan1_weight = state_attr('sensor.wan1_configuration', 'weight') | int(50) %}

          {% set wan2_weight = state_attr('sensor.wan2_configuration', 'weight') | int(50) %}


          ### Decision Logic:


          {% if mode == 'OFFLINE' %}

          🔴 **CRITICAL: Both WANs Offline**

          - No internet connectivity available

          - Immediate investigation required


          {% elif mode == 'BALANCED' %}

          🟢 **Load Balancing Active**

          {% if wan2_weight >= wan1_weight %}

          - ✅ {{ wan2_name }}: Online (Weight: {{ wan2_weight }}, Priority: {{ wan2_prio }})

          - ✅ {{ wan1_name }}: Online (Weight: {{ wan1_weight }}, Priority: {{ wan1_prio }})

          {% else %}

          - ✅ {{ wan1_name }}: Online (Weight: {{ wan1_weight }}, Priority: {{ wan1_prio }})

          - ✅ {{ wan2_name }}: Online (Weight: {{ wan2_weight }}, Priority: {{ wan2_prio }})

          {% endif %}

          - Traffic distributed across both links

          - Combined bandwidth: {{ (states('sensor.udm_wan1_total_mbps_smoothed') | float(0) + states('sensor.udm_wan2_total_mbps_smoothed') | float(0)) | round(1) }} Mbps


          {% elif mode == 'WAN2' %}

          🟢 **{{ wan2_name }} Active (Primary)**

          {% if not wan1_online %}

          - ⚠️ {{ wan1_name }} OFFLINE → Backup not available!

          - Failover capability lost

          - Outages today: {{ states('counter.wan1_outages_today') }}

          {% elif wan2_prio < wan1_prio %}

          - ✅ Operating on primary path (Priority {{ wan2_prio }})

          - ✅ {{ wan1_name }} ready as backup (Priority {{ wan1_prio }})

          - System configuration: Normal

          {% endif %}

          - Current bandwidth: {{ states('sensor.udm_wan2_total_mbps_smoothed') | float(0) | round(1) }} Mbps


          {% elif mode == 'WAN1' %}

          🟡 **{{ wan1_name }} Active (Failover Mode)**

          {% if not wan2_online %}

          - 🔴 {{ wan2_name }} OFFLINE → Automatic failover activated

          - Reason: Primary link connectivity lost

          - Outages today: {{ states('counter.wan2_outages_today') }}

          - ⚠️ Running on backup link - investigate primary!

          {% elif wan1_prio < wan2_prio %}

          - ✅ Operating on configured primary (Priority {{ wan1_prio }})

          - ✅ {{ wan2_name }} ready as backup

          {% else %}

          - ⚠️ Unexpected routing state

          - {{ wan2_name }} should be primary but {{ wan1_name }} is active

          {% endif %}

          - Current bandwidth: {{ states('sensor.udm_wan1_total_mbps_smoothed') | float(0) | round(1) }} Mbps


          {% endif %}


          ---


          ### Link Health Metrics:

          | Metric | {{ wan1_name }} | {{ wan2_name }} |

          |--------|---------|----------|

          | **Status** | {{ '🟢 Online' if wan1_online else '🔴 Offline' }} | {{ '🟢 Online' if wan2_online else '🔴 Offline' }} |

          | **Availability** | {{ state_attr('binary_sensor.wan1_online_api', 'availability') | float(0) | round(1) }}% | {{ state_attr('binary_sensor.wan2_online_api', 'availability') | float(0) | round(1) }}% |

          | **Latency** | {{ state_attr('binary_sensor.wan1_online_api', 'latency_avg') | float(0) | round(0) }}ms | {{ state_attr('binary_sensor.wan2_online_api', 'latency_avg') | float(0) | round(0) }}ms |

          | **Current Traffic** | {{ states('sensor.udm_wan1_total_mbps_smoothed') | float(0) | round(1) }} Mbps | {{ states('sensor.udm_wan2_total_mbps_smoothed') | float(0) | round(1) }} Mbps |

          | **Outages Today** | {{ states('counter.wan1_outages_today') }} | {{ states('counter.wan2_outages_today') }} |


          **Last Routing Change:** {{ states('input_datetime.internet_last_routing_change') }}
        grid_options:
          columns: 24
          rows: auto
        uix:
          style: |
            ha-card {
              background: var(--card-background-color);
              border-left: 4px solid 
                {% if states('sensor.internet_routing_mode_stable') == 'WAN2' %}
                  var(--green-color)
                {% elif states('sensor.internet_routing_mode_stable') == 'BALANCED' %}
                  var(--green-color)
                {% elif states('sensor.internet_routing_mode_stable') == 'WAN1' %}
                  var(--yellow-color)
                {% elif states('sensor.internet_routing_mode_stable') == 'OFFLINE' %}
                  var(--red-color)
                {% else %}
                  var(--amber-color)
                {% endif %};
            }
  - type: grid
    column_span: 3
    cards:
      - type: heading
        heading: Real-Time Traffic Monitoring
      - type: custom:apexcharts-card
        graph_span: 1h
        update_interval: 10s
        cache: false
        header:
          show: true
          title: Download Traffic - Stacked (Last Hour)
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 250
            type: area
            stacked: true
            stackType: normal
            animations:
              enabled: true
              easing: linear
              dynamicAnimation:
                speed: 1000
          stroke:
            curve: smooth
            width: 0
          fill:
            type: solid
            opacity: 0.8
          legend:
            show: true
            position: top
          tooltip:
            enabled: true
            shared: true
            intersect: false
          dataLabels:
            enabled: false
        series:
          - entity: sensor.udm_wan1_rx_mbps_smoothed
            name: WAN1 Download
            type: area
            color: "#4caf50"
            stroke_width: 0
            group_by:
              func: avg
              duration: 30s
          - entity: sensor.udm_wan2_rx_mbps_smoothed
            name: WAN2 Download
            type: area
            color: "#2196f3"
            stroke_width: 0
            group_by:
              func: avg
              duration: 30s
        yaxis:
          - min: 0
            apex_config:
              tickAmount: 5
              title:
                text: Mbit/s
        grid_options:
          columns: 18
      - type: custom:apexcharts-card
        graph_span: 1h
        update_interval: 10s
        cache: false
        header:
          show: true
          title: Upload Traffic - Stacked (Last Hour)
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 250
            type: area
            stacked: true
            stackType: normal
            animations:
              enabled: true
              easing: linear
              dynamicAnimation:
                speed: 1000
          stroke:
            curve: smooth
            width: 0
          fill:
            type: solid
            opacity: 0.8
          legend:
            show: true
            position: top
          tooltip:
            enabled: true
            shared: true
            intersect: false
          dataLabels:
            enabled: false
        series:
          - entity: sensor.udm_wan1_tx_mbps_smoothed
            name: WAN1 Upload
            type: area
            color: "#2e7d32"
            stroke_width: 0
            group_by:
              func: avg
              duration: 30s
          - entity: sensor.udm_wan2_tx_mbps_smoothed
            name: WAN2 Upload
            type: area
            color: "#1565c0"
            stroke_width: 0
            group_by:
              func: avg
              duration: 30s
        yaxis:
          - min: 0
            apex_config:
              tickAmount: 5
              title:
                text: Mbit/s
        grid_options:
          columns: 18
      - type: custom:apexcharts-card
        graph_span: 1h
        update_interval: 10s
        cache: false
        header:
          show: true
          title: Live Traffic (Last Hour)
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 350
            animations:
              enabled: true
              easing: linear
              dynamicAnimation:
                speed: 1000
          stroke:
            curve: smooth
            width: 2
          legend:
            show: true
            position: top
          tooltip:
            enabled: true
            shared: true
        series:
          - entity: sensor.internet_total_rx_smoothed
            name: Total ↓ Download
            type: area
            color: "#0080ff"
            opacity: 0.3
            stroke_width: 2
            group_by:
              func: avg
              duration: 30s
          - entity: sensor.internet_total_tx_smoothed
            name: Total ↑ Upload
            type: line
            color: "#a020f0"
            opacity: 1
            stroke_width: 2
            group_by:
              func: avg
              duration: 30s
        yaxis:
          - min: 0
            apex_config:
              tickAmount: 5
              title:
                text: Mbit/s
        grid_options:
          columns: full
      - type: custom:apexcharts-card
        graph_span: 6h
        update_interval: 1min
        header:
          show: true
          title: Traffic & Latency Correlation (6h)
          show_states: true
          colorize_states: true
        series:
          - entity: sensor.speedtest_ping
            name: Latency
            type: line
            stroke_width: 2
            color: "#ff3333"
            yaxis_id: latency
            group_by:
              func: avg
              duration: 5min
          - entity: sensor.internet_total_rx_smoothed
            name: Download
            type: area
            stroke_width: 1
            color: "#0080ff"
            opacity: 0.2
            yaxis_id: bandwidth
            group_by:
              func: avg
              duration: 5min
          - entity: sensor.internet_total_tx_smoothed
            name: Upload
            type: area
            stroke_width: 1
            color: "#a020f0"
            opacity: 0.2
            yaxis_id: bandwidth
            group_by:
              func: avg
              duration: 5min
        yaxis:
          - id: latency
            show: true
            min: 0
            apex_config:
              tickAmount: 4
              title:
                text: Latency (ms)
          - id: bandwidth
            show: true
            opposite: true
            min: 0
            apex_config:
              tickAmount: 4
              title:
                text: Mbit/s
        apex_config:
          chart:
            height: 300
          stroke:
            curve: smooth
          legend:
            show: true
        grid_options:
          columns: full
      - type: custom:apexcharts-card
        graph_span: 24h
        update_interval: 5min
        header:
          show: true
          title: Traffic & Latency Correlation (24h)
          show_states: true
          colorize_states: true
        series:
          - entity: sensor.speedtest_ping
            name: Latency
            type: line
            stroke_width: 2
            color: "#ff3333"
            yaxis_id: latency
            group_by:
              func: avg
              duration: 30min
          - entity: sensor.internet_total_rx_smoothed
            name: Download
            type: area
            stroke_width: 1
            color: "#0080ff"
            opacity: 0.2
            yaxis_id: bandwidth
            group_by:
              func: avg
              duration: 30min
          - entity: sensor.internet_total_tx_smoothed
            name: Upload
            type: area
            stroke_width: 1
            color: "#a020f0"
            opacity: 0.2
            yaxis_id: bandwidth
            group_by:
              func: avg
              duration: 30min
        yaxis:
          - id: latency
            show: true
            min: 0
            apex_config:
              tickAmount: 4
              title:
                text: Latency (ms)
          - id: bandwidth
            show: true
            opposite: true
            min: 0
            apex_config:
              tickAmount: 4
              title:
                text: Mbit/s
        apex_config:
          chart:
            height: 300
          stroke:
            curve: smooth
          legend:
            show: true
        grid_options:
          columns: full
  - type: grid
    column_span: 3
    cards:
      - type: heading
        heading: Network Stability & Events
      - type: history-graph
        title: WAN Availability Timeline (24h)
        hours_to_show: 24
        refresh_interval: 60
        logarithmic_scale: false
        entities:
          - entity: binary_sensor.wan1_online_api
            name: WAN1 (Fiber)
          - entity: binary_sensor.wan2_online_api
            name: WAN2 (Starlink)
        grid_options:
          columns: full
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            icon: mdi:alert-circle
            content: Failover Event
            icon_color: red
            tap_action:
              action: more-info
              entity: counter.internet_failovers_today
            uix:
              style: |
                ha-card {
                  {% if states('counter.internet_failovers_today') | int(0) > 0 %}
                    animation: blink 2s ease-in-out infinite;
                  {% endif %}
                }
                @keyframes blink {
                  0%, 100% { opacity: 1; }
                  50% { opacity: 0.3; }
                }
        alignment: center
        grid_options:
          columns: full
  - type: grid
    cards:
      - type: gauge
        entity: sensor.internet_uptime_today_percent
        name: Uptime Today
        min: 0
        max: 100
        severity:
          green: 99
          yellow: 95
          red: 0
        needle: true
      - type: custom:mushroom-entity-card
        entity: sensor.speedtest_download
        name: Download Speed
        icon: mdi:download
        icon_color: blue
        tap_action:
          action: more-info
      - type: custom:mushroom-entity-card
        entity: sensor.speedtest_upload
        name: Upload Speed
        icon: mdi:upload
        icon_color: purple
        tap_action:
          action: more-info
    column_span: 3
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: WAN1 Analytics
      - type: custom:apexcharts-card
        graph_span: 24h
        header:
          show: true
          title: WAN1 Traffic Distribution
          show_states: true
        series:
          - entity: sensor.udm_wan1_rx_mbps_smoothed
            name: Download
            type: area
            color: "#0080ff"
            opacity: 0.3
            group_by:
              func: avg
              duration: 15min
          - entity: sensor.udm_wan1_tx_mbps_smoothed
            name: Upload
            type: area
            color: "#a020f0"
            opacity: 0.3
            group_by:
              func: avg
              duration: 15min
        apex_config:
          chart:
            height: 250
          stroke:
            curve: smooth
        yaxis:
          - min: 0
            apex_config:
              title:
                text: Mbit/s
      - chart_type: bar
        period: day
        type: statistics-graph
        title: WAN1 Daily Usage (7d)
        days_to_show: 7
        stat_types:
          - change
        entities:
          - entity: sensor.udm_wan1_rx_daily_gb
            name: Download
          - entity: sensor.udm_wan1_tx_daily_gb
            name: Upload
        max_y_axis: 150
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: WAN2 Analytics
      - type: custom:apexcharts-card
        graph_span: 24h
        header:
          show: true
          title: WAN2 Traffic Distribution
          show_states: true
        series:
          - entity: sensor.udm_wan2_rx_mbps_smoothed
            name: Download
            type: area
            color: "#0080ff"
            opacity: 0.3
            group_by:
              func: avg
              duration: 15min
          - entity: sensor.udm_wan2_tx_mbps_smoothed
            name: Upload
            type: area
            color: "#a020f0"
            opacity: 0.3
            group_by:
              func: avg
              duration: 15min
        apex_config:
          chart:
            height: 250
          stroke:
            curve: smooth
        yaxis:
          - min: 0
            apex_config:
              title:
                text: Mbit/s
      - chart_type: bar
        period: day
        type: statistics-graph
        title: WAN2 Daily Usage (7d)
        days_to_show: 7
        stat_types:
          - change
        entities:
          - entity: sensor.udm_wan2_rx_daily_gb
            name: Download
          - entity: sensor.udm_wan2_tx_daily_gb
            name: Upload
        max_y_axis: 150
        fit_y_data: false
        logarithmic_scale: false
  - type: grid
    column_span: 3
    cards:
      - type: heading
        heading: Diagnostic Panel
      - type: entities
        title: Connection Health Checks
        show_header_toggle: false
        state_color: true
        entities:
          - entity: binary_sensor.internet_online
            name: Internet Connectivity
            icon: mdi:web
          - entity: binary_sensor.internet_dns_external_ok
            name: External DNS (1.1.1.1)
            icon: mdi:dns
          - entity: binary_sensor.internet_dns_adguard_ok
            name: Internal DNS (AdGuard)
            icon: mdi:shield-check
          - entity: binary_sensor.internet_http_ok
            name: HTTP Connectivity
            icon: mdi:web-check
          - type: divider
          - entity: binary_sensor.wan1_online_api
            name: WAN1 Link Status
            secondary_info: >-
              {{ state_attr('binary_sensor.wan1_online_api', 'availability') }}% uptime • {{ state_attr('binary_sensor.wan1_online_api', 'latency_avg') }}ms latency
          - entity: binary_sensor.wan2_online_api
            name: WAN2 Link Status
            secondary_info: >-
              {{ state_attr('binary_sensor.wan2_online_api', 'availability') }}% uptime • {{ state_attr('binary_sensor.wan2_online_api', 'latency_avg') }}ms latency
          - type: divider
          - entity: sensor.internet_online_round_trip_time_average
            name: Average RTT
            icon: mdi:timer-outline
          - entity: sensor.internet_online_jitter
            name: Jitter
            icon: mdi:sine-wave
      - type: entities
        title: Event Counters
        show_header_toggle: false
        entities:
          - entity: counter.internet_failovers_today
            name: Total Failovers
            icon: mdi:swap-horizontal
            secondary_info: last-changed
          - entity: counter.wan1_outages_today
            name: WAN1 Outages
            icon: mdi:alert-circle
            secondary_info: last-changed
          - entity: counter.wan2_outages_today
            name: WAN2 Outages
            icon: mdi:alert-circle
            secondary_info: last-changed
          - entity: input_datetime.internet_last_routing_change
            name: Last Routing Change
            icon: mdi:clock-outline
  - type: grid
    column_span: 3
    cards:
      - type: heading
        heading: Statistics
        heading_style: title
      - chart_type: bar
        period: day
        type: statistics-graph
        title: WAN1 vs WAN2 Daily Usage (7d)
        days_to_show: 7
        stat_types:
          - change
        entities:
          - entity: sensor.udm_wan1_rx_daily_gb
            name: WAN1 Download
          - entity: sensor.udm_wan1_tx_daily_gb
            name: WAN1 Upload
          - entity: sensor.udm_wan2_rx_daily_gb
            name: WAN2 Download
          - entity: sensor.udm_wan2_tx_daily_gb
            name: WAN2 Upload
        grid_options:
          columns: full
      - chart_type: bar
        period: month
        type: statistics-graph
        title: Monthly Bandwidth Usage
        stat_types:
          - change
        entities:
          - entity: sensor.udm_wan1_rx_monthly_gb
            name: WAN1 Download
          - entity: sensor.udm_wan1_tx_monthly_gb
            name: WAN1 Upload
          - entity: sensor.udm_wan2_rx_monthly_gb
            name: WAN2 Download
          - entity: sensor.udm_wan2_tx_monthly_gb
            name: WAN2 Upload
        grid_options:
          columns: full

  - type: grid
    column_span: 3
    cards:
      - type: heading
        heading: DNS Security and Filtering
        heading_style: title

  - type: grid
    cards:
      - title: AdGuard Home
        icon: mdi:shield-check
        right_items:
          - type: state
            entity: switch.adguard_protection
            icon: mdi:shield-check
            tap_action:
              action: more-info
          - type: state
            entity: switch.adguard_filtering
            icon: mdi:filter-variant
            tap_action:
              action: more-info
          - type: state
            entity: sensor.adguard_dns_queries_blocked_ratio
            icon: mdi:percent
            tap_action:
              action: more-info
          - type: state
            entity: sensor.adguard_average_processing_speed
            icon: mdi:speedometer
            tap_action:
              action: more-info
        type: custom:jarvis-room-header-card
        grid_options:
          columns: full
    column_span: 3

  - type: grid
    column_span: 3
    cards:
      - type: custom:mushroom-template-card
        primary: DNS Security Status
        secondary: >
          {%- set prot = is_state('switch.adguard_protection', 'on') -%}
          {%- set ratio = states('sensor.adguard_dns_queries_blocked_ratio') | float(0) -%}
          {%- if not prot -%}
            Protection Disabled
          {%- elif ratio > 0.4 -%}
            High Threat Activity
          {%- elif ratio > 0.2 -%}
            Elevated Filtering
          {%- else -%}
            Normal
          {%- endif -%}
        icon: mdi:shield-check
        icon_color: >
          {%- set prot = is_state('switch.adguard_protection', 'on') -%}
          {%- set ratio = states('sensor.adguard_dns_queries_blocked_ratio') | float(0) -%}
          {%- if not prot -%}
            red
          {%- elif ratio > 0.4 -%}
            red
          {%- elif ratio > 0.2 -%}
            orange
          {%- else -%}
            green
          {%- endif -%}

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: DNS Queries 90d
            secondary: "{{ states('sensor.adguard_dns_queries') }}"
            icon: mdi:dns
            tap_action:
              action: more-info
              entity: sensor.adguard_dns_queries

          - type: custom:mushroom-template-card
            primary: Blocked 90d
            secondary: "{{ states('sensor.adguard_dns_queries_blocked') }}"
            icon: mdi:shield-off
            icon_color: >-
              {% set b = states('sensor.adguard_dns_queries_blocked') | float(0) %}
              {{ 'green' if b == 0 else 'orange' if b < 50000 else 'red' }}
            tap_action:
              action: more-info
              entity: sensor.adguard_dns_queries_blocked

          - type: custom:mushroom-template-card
            primary: Block Rate
            secondary: >-
              {% set r = states('sensor.adguard_dns_queries_blocked_ratio') | float(0) %}
              {{ (r) | round(1) }}%
            icon: mdi:percent
            icon_color: >-
              {% set r = states('sensor.adguard_dns_queries_blocked_ratio') | float(0) %}
              {{ 'green' if r < 0.05 else 'amber' if r < 0.15 else 'orange' if r < 0.30 else 'red' }}
            tap_action:
              action: more-info
              entity: sensor.adguard_dns_queries_blocked_ratio
        grid_options:
          columns: 24
          rows: auto

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Processing Speed
            secondary: "{{ states('sensor.adguard_average_processing_speed') }}"
            icon: mdi:timer-outline
            tap_action:
              action: more-info
              entity: sensor.adguard_average_processing_speed

          - type: custom:mushroom-template-card
            primary: Safe Browsing
            secondary: "{{ states('sensor.adguard_safe_browsing_blocked') }} blocked"
            icon: mdi:web-cancel
            icon_color: >-
              {% set n = states('sensor.adguard_safe_browsing_blocked') | int(0) %}
              {{ 'green' if n == 0 else 'orange' if n < 5 else 'red' }}
            tap_action:
              action: more-info
              entity: sensor.adguard_safe_browsing_blocked

          - type: custom:mushroom-template-card
            primary: Parental Control
            secondary: "{{ states('sensor.adguard_parental_control_blocked') }} blocked"
            icon: mdi:account-child
            icon_color: >-
              {% set n = states('sensor.adguard_parental_control_blocked') | int(0) %}
              {{ 'green' if n == 0 else 'orange' if n < 5 else 'red' }}
            tap_action:
              action: more-info
              entity: sensor.adguard_parental_control_blocked
        grid_options:
          columns: 24
          rows: auto

      - type: custom:apexcharts-card
        graph_span: 6h
        update_interval: 1min
        cache: true
        header:
          show: true
          title: DNS Activity per 5 min
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 260
          stroke:
            curve: smooth
          legend:
            show: true
        yaxis:
          - id: queries
            min: 0
            decimals: 0
            apex_config:
              tickAmount: 4
          - id: blocked
            min: 0
            opposite: true
            decimals: 0
            apex_config:
              tickAmount: 4
        series:
          - entity: sensor.adguard_dns_queries
            name: Queries / 5 min
            type: column
            yaxis_id: queries
            group_by:
              func: diff
              duration: 5min
              start_with_last: true
              fill: last

          - entity: sensor.adguard_dns_queries_blocked
            name: Blocked / 5 min
            type: line
            yaxis_id: blocked
            group_by:
              func: diff
              duration: 5min
              start_with_last: true
              fill: last

      - type: entities
        title: AdGuard Controls
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.adguard_protection
            name: Protection
            icon: mdi:shield-check
          - entity: switch.adguard_filtering
            name: Filtering
            icon: mdi:filter-variant
          - entity: switch.adguard_query_log
            name: Query Log
            icon: mdi:text-box-search
          - entity: switch.adguard_safe_browsing
            name: Safe Browsing
            icon: mdi:shield-search
          - entity: switch.adguard_safe_search
            name: Safe Search
            icon: mdi:magnify
          - entity: switch.adguard_parental_control
            name: Parental Control
            icon: mdi:account-child
          - type: divider
          - entity: sensor.adguard_rules_count
            name: Rules Count
            icon: mdi:format-list-bulleted
          - entity: sensor.adguard_safe_searches_enforced
            name: Safe Searches Enforced
            icon: mdi:check-decagram
        grid_options:
          columns: full
