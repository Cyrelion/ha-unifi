            {% endif %}

      - name: "WAN1 Latency Raw"
        unique_id: wan1_latency_raw
        unit_of_measurement: "ms"
        state_class: measurement
        icon: mdi:timer-outline
        state: >
          {% set v = state_attr('binary_sensor.wan1_online_api', 'latency_avg') | float(0) %}
          {% if is_state('binary_sensor.wan1_online_api', 'on') and v > 0 %}
            {{ v }}
          {% else %}
            {{ this.state if this is defined and this.state not in ['unknown','unavailable',''] else 12 }}
          {% endif %}

      - name: "WAN2 Latency Raw"
        unique_id: wan2_latency_raw
        unit_of_measurement: "ms"
        state_class: measurement
        icon: mdi:timer-outline
        state: >
          {% set v = state_attr('binary_sensor.wan2_online_api', 'latency_avg') | float(0) %}
          {% if is_state('binary_sensor.wan2_online_api', 'on') and v > 0 %}
            {{ v }}
          {% else %}
            {{ this.state if this is defined and this.state not in ['unknown','unavailable',''] else 30 }}
          {% endif %}

      - name: "WAN1 Expected Latency"
        unique_id: wan1_expected_latency
        unit_of_measurement: "ms"
        state: >
          {{ states('sensor.wan1_latency_baseline') | float(12) | round(1) }}

      - name: "WAN2 Expected Latency"
        unique_id: wan2_expected_latency
        unit_of_measurement: "ms"
        state: >
          {{ states('sensor.wan2_latency_baseline') | float(30) | round(1) }}
          
      - name: "WAN1 Stability Score"
        unique_id: wan1_stability_score
        unit_of_measurement: "%"
        icon: mdi:shield-check
        state: >
          {% set avail = state_attr('binary_sensor.wan1_online_api', 'availability') | float(0) %}
          {% set lat = state_attr('binary_sensor.wan1_online_api', 'latency_avg') | float(0) %}
          {% set expected = states('sensor.wan1_expected_latency') | float(12) %}
          {% set online = is_state('binary_sensor.wan1_online_api', 'on') %}

          {% set avail_score = avail * 0.60 %}

          {% if expected > 0 %}
            {% set deviation = lat / expected %}
            {% set lat_score_raw = 100 - ((deviation - 1) * 100) %}
          {% else %}
            {% set lat_score_raw = 100 %}
          {% endif %}

          {% set lat_score = [[lat_score_raw, 0] | max, 100] | min %}
          {% set lat_score_weighted = lat_score * 0.25 %}
          {% set online_score = 15 if online else 0 %}

          {% set total = avail_score + lat_score_weighted + online_score %}
          {{ [[total, 0] | max, 100] | min | round(0) }}
        attributes:
          availability: "{{ state_attr('binary_sensor.wan1_online_api', 'availability') | float(0) }}"
          latency_avg: "{{ state_attr('binary_sensor.wan1_online_api', 'latency_avg') | float(0) }}"
          expected_latency: "{{ states('sensor.wan1_expected_latency') | float(12) }}"
          latency_deviation: >
            {% set lat = state_attr('binary_sensor.wan1_online_api', 'latency_avg') | float(0) %}
            {% set expected = states('sensor.wan1_expected_latency') | float(12) %}
            {% if expected > 0 %}
              {{ (lat / expected) | round(2) }}
            {% else %}
              0
            {% endif %}
          online: "{{ is_state('binary_sensor.wan1_online_api', 'on') }}"
          
      - name: "WAN2 Stability Score"
        unique_id: wan2_stability_score
        unit_of_measurement: "%"
        icon: mdi:shield-check
        state: >
          {% set avail = state_attr('binary_sensor.wan2_online_api', 'availability') | float(0) %}
          {% set lat = state_attr('binary_sensor.wan2_online_api', 'latency_avg') | float(0) %}
          {% set expected = states('sensor.wan2_expected_latency') | float(30) %}
          {% set online = is_state('binary_sensor.wan2_online_api', 'on') %}

          {% set avail_score = avail * 0.60 %}

          {% if expected > 0 %}
            {% set deviation = lat / expected %}
            {% set lat_score_raw = 100 - ((deviation - 1) * 100) %}
          {% else %}
            {% set lat_score_raw = 100 %}
          {% endif %}

          {% set lat_score = [[lat_score_raw, 0] | max, 100] | min %}
          {% set lat_score_weighted = lat_score * 0.25 %}
          {% set online_score = 15 if online else 0 %}

          {% set total = avail_score + lat_score_weighted + online_score %}
          {{ [[total, 0] | max, 100] | min | round(0) }}
        attributes:
          availability: "{{ state_attr('binary_sensor.wan2_online_api', 'availability') | float(0) }}"
          latency_avg: "{{ state_attr('binary_sensor.wan2_online_api', 'latency_avg') | float(0) }}"
          expected_latency: "{{ states('sensor.wan2_expected_latency') | float(30) }}"
          latency_deviation: >
            {% set lat = state_attr('binary_sensor.wan2_online_api', 'latency_avg') | float(0) %}
            {% set expected = states('sensor.wan2_expected_latency') | float(30) %}
            {% if expected > 0 %}
              {{ (lat / expected) | round(2) }}
            {% else %}
              0
            {% endif %}
          online: "{{ is_state('binary_sensor.wan2_online_api', 'on') }}"

      - name: "Internet Routing Mode"
        unique_id: internet_routing_mode_api
        icon: mdi:wan
        state: >
          {% if is_state('binary_sensor.udm_wan_api_fresh', 'off') %}
            STALE
          {% else %}
            {% set data = state_attr('sensor.udm_wan_config_raw', 'data') %}
            {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
            {% set health_valid = health and (health.WAN is defined or health.WAN2 is defined) %}
            {% set data_valid = data is iterable and (data | length) > 0 %}
            {% if not health_valid or not data_valid %}
              {% if this is defined and this.state not in ['unknown', 'unavailable', ''] %}
                {{ this.state }}
              {% else %}
                UNKNOWN
              {% endif %}
            {% else %}
              {% set wan1_online = is_state('binary_sensor.wan1_online_api', 'on') %}
              {% set wan2_online = is_state('binary_sensor.wan2_online_api', 'on') %}
              {% set wan1 = data | selectattr('wan_networkgroup', 'equalto', 'WAN') | list | first %}
              {% set wan2 = data | selectattr('wan_networkgroup', 'equalto', 'WAN2') | list | first %}
              {% if not wan1_online and not wan2_online %}
                OFFLINE
              {% elif wan1_online and wan2_online %}
                {% set wan1_lb = wan1.wan_load_balance_type if wan1 else '' %}
                {% set wan2_lb = wan2.wan_load_balance_type if wan2 else '' %}
                {% if wan1_lb == 'weighted' and wan2_lb == 'weighted' %}
                  BALANCED
                {% else %}
                  {% set wan1_prio = wan1.wan_failover_priority if wan1 else 999 %}
                  {% set wan2_prio = wan2.wan_failover_priority if wan2 else 999 %}
                  {% if wan1_prio < wan2_prio %}
                    WAN1
                  {% else %}
                    WAN2
                  {% endif %}
                {% endif %}
              {% elif wan1_online %}
                WAN1
              {% elif wan2_online %}
                WAN2
              {% else %}
                UNKNOWN
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          wan1_name: >
            {% set data = state_attr('sensor.udm_wan_config_raw', 'data') %}
            {% set data_valid = data is iterable and (data | length) > 0 %}
            {% if data_valid %}
              {% set wan1 = data | selectattr('wan_networkgroup', 'equalto', 'WAN') | list | first %}
              {{ wan1.name if wan1 else 'WAN1' }}
            {% elif this is defined and this.attributes is defined %}
              {{ this.attributes.get('wan1_name', 'WAN1') }}
            {% else %}
              WAN1
            {% endif %}
          wan2_name: >
            {% set data = state_attr('sensor.udm_wan_config_raw', 'data') %}
            {% set data_valid = data is iterable and (data | length) > 0 %}
            {% if data_valid %}
              {% set wan2 = data | selectattr('wan_networkgroup', 'equalto', 'WAN2') | list | first %}
              {{ wan2.name if wan2 else 'WAN2' }}
            {% elif this is defined and this.attributes is defined %}
              {{ this.attributes.get('wan2_name', 'WAN2') }}
            {% else %}
              WAN2
            {% endif %}
          wan1_online: "{{ is_state('binary_sensor.wan1_online_api', 'on') }}"
          wan2_online: "{{ is_state('binary_sensor.wan2_online_api', 'on') }}"
          wan1_availability: "{{ state_attr('binary_sensor.wan1_online_api', 'availability') }}"
          wan2_availability: "{{ state_attr('binary_sensor.wan2_online_api', 'availability') }}"
          wan1_latency: "{{ state_attr('binary_sensor.wan1_online_api', 'latency_avg') }}"
          wan2_latency: "{{ state_attr('binary_sensor.wan2_online_api', 'latency_avg') }}"
          wan1_mbps: "{{ states('sensor.udm_wan1_total_mbps_smoothed') | float(0) | round(2) }}"
          wan2_mbps: "{{ states('sensor.udm_wan2_total_mbps_smoothed') | float(0) | round(2) }}"
          detail: >
            {% set mode = states('sensor.internet_routing_mode_api') %}
            {% set data = state_attr('sensor.udm_wan_config_raw', 'data') %}
            {% set data_valid = data is iterable and (data | length) > 0 %}

            {% if data_valid %}
              {% set wan1 = data | selectattr('wan_networkgroup', 'equalto', 'WAN') | list | first %}
              {% set wan2 = data | selectattr('wan_networkgroup', 'equalto', 'WAN2') | list | first %}
              {% set wan1_name = wan1.name if wan1 else 'WAN1' %}
              {% set wan2_name = wan2.name if wan2 else 'WAN2' %}
            {% elif this is defined and this.attributes is defined %}
              {% set wan1_name = this.attributes.get('wan1_name', 'WAN1') %}
              {% set wan2_name = this.attributes.get('wan2_name', 'WAN2') %}
            {% else %}
              {% set wan1_name = 'WAN1' %}
              {% set wan2_name = 'WAN2' %}
            {% endif %}

            {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
            {% if health and health.WAN is defined %}
              {% set wan1_latency = health.WAN.latency_average | float(0) %}
            {% elif this is defined and this.attributes is defined %}
              {% set wan1_latency = this.attributes.get('wan1_latency', 0) | float(0) %}
            {% else %}
              {% set wan1_latency = 0 %}
            {% endif %}

            {% if health and health.WAN2 is defined %}
              {% set wan2_latency = health.WAN2.latency_average | float(0) %}
            {% elif this is defined and this.attributes is defined %}
              {% set wan2_latency = this.attributes.get('wan2_latency', 0) | float(0) %}
            {% else %}
              {% set wan2_latency = 0 %}
            {% endif %}

            {% set wan1_mbps = states('sensor.udm_wan1_total_mbps_smoothed') | float(0) %}
            {% set wan2_mbps = states('sensor.udm_wan2_total_mbps_smoothed') | float(0) %}

            {% if mode == 'BALANCED' %}
              Load balanced: {{ wan1_name }} {{ wan1_mbps | round(1) }} Mbps ({{ wan1_latency | round(1) }}ms) | {{ wan2_name }} {{ wan2_mbps | round(1) }} Mbps ({{ wan2_latency | round(1) }}ms)
            {% elif mode == 'WAN1' %}
              {{ wan1_name }} active {{ wan1_mbps | round(1) }} Mbps ({{ wan1_latency | round(1) }}ms)
            {% elif mode == 'WAN2' %}
              {{ wan2_name }} active {{ wan2_mbps | round(1) }} Mbps ({{ wan2_latency | round(1) }}ms)
            {% elif mode in ['STALE', 'UNKNOWN', 'OFFLINE'] %}
              {{ mode }}
            {% elif this is defined and this.attributes is defined and this.attributes.get('detail') not in [none, '', 'unknown', 'unavailable'] %}
              {{ this.attributes.get('detail') }}
            {% else %}
              {{ mode }}
            {% endif %}