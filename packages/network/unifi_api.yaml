command_line:
  - sensor:
      name: "UDM WAN Health Raw"
      unique_id: udm_wan_health_raw
      scan_interval: 60
      command_timeout: 15
      command: "/config/scripts/get_wan_health.sh"
      value_template: >
        {% if value_json.status is defined %}
          {{ value_json.status }}
        {% else %}
          unknown
        {% endif %}
      json_attributes:
        - wan_ip
        - status
        - uptime_stats
        - isp_name
        - tx_bytes-r
        - rx_bytes-r

  - sensor:
      name: "UDM WAN Config Raw"
      unique_id: udm_wan_config_raw
      scan_interval: 300
      command_timeout: 15
      command: "/config/scripts/get_wan_config.sh"
      value_template: >
        {% if value_json.data is defined %}
          {{ value_json.data | length }} WANs
        {% else %}
          unknown
        {% endif %}
      json_attributes:
        - data

template:
  - binary_sensor:
      - name: "UDM WAN API Fresh"
        unique_id: udm_wan_api_fresh
        device_class: connectivity
        state: >
          {% set max_age = 180 %}
          {% set ts = as_timestamp(states.sensor.udm_wan_health_raw.last_updated)
               if states.sensor.udm_wan_health_raw is defined else 0 %}
          {{ ts > 0 and (as_timestamp(now()) - ts) < max_age }}
        attributes:
          age_seconds: >
            {% set ts = as_timestamp(states.sensor.udm_wan_health_raw.last_updated)
                 if states.sensor.udm_wan_health_raw is defined else 0 %}
            {% if ts > 0 %}
              {{ (as_timestamp(now()) - ts) | int }}
            {% else %}
              9999
            {% endif %}
            
      - name: "WAN1 Online Raw"
        unique_id: wan1_online_api_raw
        device_class: connectivity
        state: >
          {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
          {% set w = health.WAN if health and health.WAN is defined else none %}
          {% if w is not none %}
            {% set avail = w.availability | float(0) %}
            {% set uptime = w.uptime | int(0) %}
            {% set lat = w.latency_average | float(0) %}
            {{ avail > 0 or uptime > 0 or lat > 0 }}
          {% else %}
            {% if this is defined and this.state in ['on', 'off'] %}
              {{ this.state }}
            {% else %}
              false
            {% endif %}
          {% endif %}
        attributes:
          availability: >
            {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
            {% set w = health.WAN if health and health.WAN is defined else none %}
            {% if w is not none %}
              {{ w.availability | float(0) }}
            {% elif this is defined and this.attributes is defined %}
              {{ this.attributes.get('availability', 0) }}
            {% else %}
              0
            {% endif %}
          latency_avg: >
            {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
            {% set w = health.WAN if health and health.WAN is defined else none %}
            {% if w is not none %}
              {{ w.latency_average | float(0) }}
            {% elif this is defined and this.attributes is defined %}
              {{ this.attributes.get('latency_avg', 0) }}
            {% else %}
              0
            {% endif %}
          uptime: >
            {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
            {% set w = health.WAN if health and health.WAN is defined else none %}
            {% if w is not none %}
              {{ w.uptime | int(0) }}
            {% elif this is defined and this.attributes is defined %}
              {{ this.attributes.get('uptime', 0) }}
            {% else %}
              0
            {% endif %}

      - name: "WAN2 Online Raw"
        unique_id: wan2_online_api_raw
        device_class: connectivity
        state: >
          {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
          {% set w = health.WAN2 if health and health.WAN2 is defined else none %}
          {% if w is not none %}
            {% set avail = w.availability | float(0) %}
            {% set uptime = w.uptime | int(0) %}
            {% set lat = w.latency_average | float(0) %}
            {{ avail > 0 or uptime > 0 or lat > 0 }}
          {% else %}
            {% if this is defined and this.state in ['on', 'off'] %}
              {{ this.state }}
            {% else %}
              false
            {% endif %}
          {% endif %}
        attributes:
          availability: >
            {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
            {% set w = health.WAN2 if health and health.WAN2 is defined else none %}
            {% if w is not none %}
              {{ w.availability | float(0) }}
            {% elif this is defined and this.attributes is defined %}
              {{ this.attributes.get('availability', 0) }}
            {% else %}
              0
            {% endif %}
          latency_avg: >
            {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
            {% set w = health.WAN2 if health and health.WAN2 is defined else none %}
            {% if w is not none %}
              {{ w.latency_average | float(0) }}
            {% elif this is defined and this.attributes is defined %}
              {{ this.attributes.get('latency_avg', 0) }}
            {% else %}
              0
            {% endif %}
          uptime: >
            {% set health = state_attr('sensor.udm_wan_health_raw', 'uptime_stats') %}
            {% set w = health.WAN2 if health and health.WAN2 is defined else none %}
            {% if w is not none %}
              {{ w.uptime | int(0) }}
            {% elif this is defined and this.attributes is defined %}
              {{ this.attributes.get('uptime', 0) }}
            {% else %}
              0
            {% endif %}

      - name: "WAN1 Online"
        unique_id: wan1_online_api
        device_class: connectivity
        delay_on:
          seconds: 65
        delay_off:
          seconds: 65
        state: "{{ is_state('binary_sensor.wan1_online_raw', 'on') }}"
        attributes:
          availability: "{{ state_attr('binary_sensor.wan1_online_raw', 'availability') }}"
          latency_avg: "{{ state_attr('binary_sensor.wan1_online_raw', 'latency_avg') }}"
          uptime: "{{ state_attr('binary_sensor.wan1_online_raw', 'uptime') }}"

      - name: "WAN2 Online"
        unique_id: wan2_online_api
        device_class: connectivity
        delay_on:
          seconds: 65
        delay_off:
          seconds: 65
        state: "{{ is_state('binary_sensor.wan2_online_raw', 'on') }}"
        attributes:
          availability: "{{ state_attr('binary_sensor.wan2_online_raw', 'availability') }}"
          latency_avg: "{{ state_attr('binary_sensor.wan2_online_raw', 'latency_avg') }}"
          uptime: "{{ state_attr('binary_sensor.wan2_online_raw', 'uptime') }}"

